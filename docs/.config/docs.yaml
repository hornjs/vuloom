# yaml-language-server: $schema=https://unpkg.com/nudocs/schema/config.json

name: "Vuloom"
shortDescription: "The Full-Stack Vue Framework"
description: "Build full-stack Vue applications with typed file routing, server rendering, route loaders and actions, and first-class server handlers."
github: "hornjs/vuloom"
url: "https://vuloom.pages.dev"
# redirects:
#   "/from": "/to"
automd: true
lang: en
banner:
  icon: "i-lucide-info"
  title: "in-processing"
landing:
  contributors: true
  heroLinks:
    primary:
      label: "Get Started"
      icon: "i-heroicons-rocket-launch"
      to: "/getting-started"
    playOnline:
      label: "Play Online"
      icon: "i-heroicons-play"
      to: "https://stackblitz.com/fork/github/hornjs/vuloom/tree/main/examples/zero-config?startScript=dev&title=Vuloom%20StackBlitz%20Example"

  features:
    - title: "Typed File Routing"
      description: "<p>Generate route ids, route params, middleware names, and navigation targets directly from your app structure with <code>horn prepare</code>.</p>\n"
      icon: "clarity:success-standard-line"
    - title: "Full-Stack by Default"
      description: "<p>Ship page routes, route loaders and actions, app shell data, and raw <code>server/routes</code> HTTP handlers from one project structure.</p>\n"
      icon: "devicon-plain:fastapi"
    - title: "Vue-Native DX"
      description: "<p>Use Vue SFC, JSX/TSX, or render functions with document-level SSR, navigation loading boundaries, and composables built for Vue 3.</p>\n"
      icon: "hugeicons:happy"
